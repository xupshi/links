<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>xupshi</title>
        <link rel="icon" type="image/jpg" href="images/xup.jpg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0c0c0e;
                --surface: #131316;
                --border: #1f1f24;
                --border-hi: #2e2e36;
                --text: #e8e6e1;
                --muted: #5a5860;
                --accent: #c8a97e;
                --accent2: #7e9bc8;
                --grain-opacity: 0.035;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "DM Mono", monospace;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 3rem 1.5rem 5rem;
                position: relative;
                overflow-x: hidden;
            }

            /* grain overlay */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
                opacity: var(--grain-opacity);
                pointer-events: none;
                z-index: 999;
            }

            /* ambient glow */
            body::after {
                content: "";
                position: fixed;
                top: -20vh;
                left: 50%;
                transform: translateX(-50%);
                width: 600px;
                height: 600px;
                background: radial-gradient(
                    ellipse,
                    rgba(200, 169, 126, 0.04) 0%,
                    transparent 70%
                );
                pointer-events: none;
                z-index: 0;
            }

            .wrapper {
                width: 100%;
                max-width: 480px;
                position: relative;
                z-index: 1;
            }

            /* ── header ── */
            header {
                text-align: center;
                margin-bottom: 3.5rem;
                animation: fadeUp 0.7s ease both;
            }

            .avatar-wrap {
                width: 72px;
                height: 72px;
                margin: 0 auto 1.2rem;
                position: relative;
            }

            .avatar-wrap img {
                width: 100%;
                height: 100%;
                border-radius: 50%;
                object-fit: cover;
                border: 1px solid var(--border-hi);
                display: block;
            }

            .avatar-ring {
                position: absolute;
                inset: -4px;
                border-radius: 50%;
                border: 1px solid transparent;
                background: linear-gradient(
                        135deg,
                        var(--accent),
                        transparent,
                        var(--accent2)
                    )
                    border-box;
                -webkit-mask:
                    linear-gradient(#fff 0 0) padding-box,
                    linear-gradient(#fff 0 0);
                -webkit-mask-composite: destination-out;
                mask-composite: exclude;
            }

            h1 {
                font-family: "Instrument Serif", serif;
                font-size: 2rem;
                font-weight: 400;
                letter-spacing: -0.01em;
                color: var(--text);
                line-height: 1;
                margin-bottom: 0.4rem;
            }

            /* ── cards ── */
            .links {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 3rem;
            }

            .link-card {
                display: flex;
                align-items: center;
                gap: 1rem;
                padding: 0.9rem 1.1rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
                text-decoration: none;
                color: var(--text);
                position: relative;
                overflow: hidden;
                transition:
                    border-color 0.2s,
                    transform 0.2s;
                animation: fadeUp 0.6s ease both;
            }

            .link-card::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.015),
                    transparent
                );
                opacity: 0;
                transition: opacity 0.3s;
            }

            .link-card:hover {
                border-color: var(--border-hi);
                transform: translateX(3px);
            }

            .link-card:hover::before {
                opacity: 1;
            }

            .link-card:nth-child(1) {
                animation-delay: 0.05s;
            }
            .link-card:nth-child(2) {
                animation-delay: 0.1s;
            }
            .link-card:nth-child(3) {
                animation-delay: 0.15s;
            }
            .link-card:nth-child(4) {
                animation-delay: 0.2s;
            }
            .link-card:nth-child(5) {
                animation-delay: 0.25s;
            }

            .link-icon {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                font-size: 1rem;
                border: 1px solid var(--border);
                background: var(--bg);
            }

            .link-icon img {
                width: 20px;
                height: 20px;
                object-fit: contain;
                border-radius: 3px;
            }

            .link-info {
                flex: 1;
                min-width: 0;
            }

            .link-name {
                font-size: 0.82rem;
                font-weight: 500;
                letter-spacing: 0.02em;
                color: var(--text);
                display: block;
                margin-bottom: 0.15rem;
            }

            .link-desc {
                font-size: 0.65rem;
                color: var(--muted);
                letter-spacing: 0.05em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .link-arrow {
                font-size: 0.7rem;
                color: var(--muted);
                flex-shrink: 0;
                transition:
                    color 0.2s,
                    transform 0.2s;
            }

            .link-card:hover .link-arrow {
                color: var(--accent);
                transform: translateX(2px);
            }

            /* accent dot on hover */
            .link-card::after {
                content: "";
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%) scaleY(0);
                width: 2px;
                height: 60%;
                background: var(--accent);
                border-radius: 0 2px 2px 0;
                transition: transform 0.2s;
            }

            .link-card:hover::after {
                transform: translateY(-50%) scaleY(1);
            }

            /* ── socials row ── */
            .socials {
                display: flex;
                gap: 0.5rem;
                margin-bottom: 3rem;
                animation: fadeUp 0.6s 0.35s ease both;
            }

            .social-btn {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0.85rem 0.5rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
                text-decoration: none;
                color: var(--muted);
                transition:
                    color 0.2s,
                    border-color 0.2s;
            }

            .social-btn:hover {
                color: var(--text);
                border-color: var(--border-hi);
            }

            .social-btn svg {
                flex-shrink: 0;
            }

            /* ── footer ── */
            footer {
                text-align: center;
                font-size: 0.6rem;
                letter-spacing: 0.15em;
                color: var(--muted);
                animation: fadeUp 0.6s 0.45s ease both;
            }

            footer span {
                color: var(--accent);
            }

            /* ── animation ── */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(14px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
